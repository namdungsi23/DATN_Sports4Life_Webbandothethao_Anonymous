<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/Admin-content}">
<head>
<meta charset="UTF-8">
<title>Quản lý danh mục</title>
</head>

<body>
	<div layout:fragment="main-content">
		<div class="container-fluid px-4 mt-4">

			<!-- ===== TITLE ===== -->
			<div class="d-flex justify-content-between align-items-center mb-4">
				<h4 class="fw-bold mb-0">📂 Quản lý danh mục</h4>
			</div>
			
			<!-- CREATE SUCCESS -->
			<span id="saveSuccessMsg"
			      th:if="${saveSuccessMsg}"
			      th:text="${saveSuccessMsg}"
			      class="alert alert-success d-block mb-3">
			</span>
			
			<!-- CREATE FAIL -->
			<span id="saveErrorMsg"
			      th:if="${saveErrorMsg}"
			      th:text="${saveErrorMsg}"
			      class="alert alert-danger d-block mb-3">
			</span>
			
			
			<!-- DELETE SUCCESS -->
			<span id="deleteSuccessMsg"
			      th:if="${deleteSuccessMsg}"
			      th:text="${deleteSuccessMsg}"
			      class="alert alert-success d-block mb-3">
			</span>
			
			<!-- DELETE FAIL -->
			<span id="deleteErrorMsg"
			      th:if="${deleteErrorMsg}"
			      th:text="${deleteErrorMsg}"
			      class="alert alert-danger d-block mb-3">
			</span>
			
			
			<form class="row g-2 mb-3" method="get"
				th:action="@{/admin/category}">
				<div class="col-md-6">
					<input type="text" name="keyword" th:value="${keyword}"
						class="form-control" placeholder="🔍 Tìm theo tên danh mục">
				</div>

				<div class="col-md-3">
					<select name="size" class="form-select"
						onchange="this.form.submit()">
						<option value="all"
							th:selected="${param.size == null || param.size == 'all'}">
							Tất cả danh mục</option>

						<option value="3" th:selected="${param.size == '3'}">3
							dòng</option>
						<option value="10" th:selected="${param.size == '10'}">10
							dòng</option>
						<option value="12" th:selected="${param.size == '12'}">12
							dòng</option>
					</select>
				</div>


				<div class="col-md-3">
					<button class="btn btn-primary w-100">🔎 Tìm kiếm</button>
				</div>
			</form>

			<div class="row g-4">

				<!-- ===== FORM ===== -->
				<div class="col-lg-4">
					<div class="card shadow border-0">
						<div class="card-header"
							th:classappend="${category.id == null ? 'bg-primary' : 'bg-warning text-dark'}">
							<strong
								th:text="${category.id == null ? '➕ Thêm danh mục' : '✏️ Cập nhật danh mục'}">
							</strong>
						</div>

						<div class="card-body">
							<form th:object="${category}"
								  th:action="${category.id == null} ? @{/admin/category/create} : @{/admin/category/update}"
								  method="post">

								<!-- HIỂN THỊ ID (KHÔNG CHO SỬA) -->
								<div class="mb-2" th:if="${category.id != null}">
									<label class="form-label fw-semibold">Mã danh mục</label> 
									<input type="text" th:value="${category.id}" class="form-control"
										   readonly>
								</div>

								<!-- 🔥 BẮT BUỘC: GỬI ID VỀ SERVER -->
								<input type="hidden" th:field="*{id}">

								<div class="mb-3">
									<label class="form-label fw-semibold">Tên danh mục</label> <input
										type="text" th:field="*{name}" class="form-control"
										placeholder="Nhập tên danh mục" required>
								</div>

								<button id="saveBtn"
										class="btn btn-success w-100 fw-semibold">💾
									Lưu danh mục</button>
							</form>

						</div>
					</div>
				</div>

				<!-- ===== TABLE ===== -->
				<div class="col-lg-8">
					<div class="card shadow border-0">
						<div class="card-header bg-dark text-white fw-semibold">📋
							Danh sách danh mục</div>

						<div class="card-body p-0">
							<table class="table table-hover align-middle mb-0">
								<thead class="table-light">
									<tr>
										<th style="width: 80px">ID</th>
										<th>Tên danh mục</th>
										<th style="width: 160px">Hành động</th>
									</tr>
								</thead>

								<tbody>
									<tr th:each="c : ${categories}">
										<td th:text="${c.id}"></td>
										<td class="fw-semibold" th:text="${c.name}"></td>
										<td><a th:id="|editBtn_${c.id}|"
										       th:href="@{/admin/category/edit/{id}(id=${c.id})}"
											   class="btn btn-sm btn-outline-warning me-1"> 
											   ✏️ Sửa 
											</a> 
											<a th:id="|deleteBtn_${c.id}|"
											   th:href="@{/admin/category/delete/{id}(id=${c.id})}"
											   class="btn btn-sm btn-outline-danger"
											   onclick="return confirm('Xóa danh mục này?')"> 
											   🗑 Xóa 
										    </a>
									    </td>
									</tr>

									<tr th:if="${#lists.isEmpty(categories)}">
										<td colspan="3" class="text-center text-muted py-4">
											Không có danh mục nào</td>
									</tr>
								</tbody>
							</table>
							<nav th:if="${totalPages > 1}">
								<ul class="pagination justify-content-center mt-3">

									<li class="page-item"
										th:classappend="${currentPage == 0 ? 'disabled' : ''}"><a
										class="page-link"
										th:href="@{/admin/category(page=${currentPage - 1}, keyword=${keyword})}">
											‹ </a></li>

									<li class="page-item"
										th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
										th:classappend="${i == currentPage ? 'active' : ''}"><a
										class="page-link" th:text="${i + 1}"
										th:href="@{/admin/category(page=${i}, keyword=${keyword})}">
									</a></li>

									<li class="page-item"
										th:classappend="${currentPage + 1 == totalPages ? 'disabled' : ''}">
										<a class="page-link"
										th:href="@{/admin/category(page=${currentPage + 1}, keyword=${keyword})}">
											› </a>
									</li>

								</ul>
							</nav>

						</div>

					</div>
				</div>

			</div>
		</div>
	</div>
</body>
</html>
