<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layouts/Admin-content}">
<head>
    <meta charset="UTF-8">
    <title>Quản lý đơn hàng</title>
</head>

<body>
<div layout:fragment="main-content">

    <!-- ================= ORDER LIST ================= -->
    <div class="card mb-4">
        <div class="card-header fw-bold">📋 Danh sách đơn hàng</div>

        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>User</th>
                    <th>Ngày tạo</th>
                    <th>Địa chỉ</th>
                    <th>Trạng thái</th>
                    <th>Tổng tiền</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="o : ${orders}">
                    <td th:text="${o.id}"></td>
                    <td th:text="${o.account.username}"></td>
                    <td th:text="${o.createDate}"></td>
                    <td th:text="${o.address}"></td>

                    <td>
                        <span class="badge bg-warning" th:if="${o.status == 'NEW'}">NEW</span>
                        <span class="badge bg-success" th:if="${o.status == 'CONFIRMED'}">CONFIRMED</span>
                        <span class="badge bg-danger" th:if="${o.status == 'CANCELLED'}">CANCELLED</span>
                    </td>

                    <td th:text="${#numbers.formatDecimal(o.totalAmount,0,'COMMA',0,'POINT')} + ' ₫'"></td>

                    <!-- 🔥 FIX LINK + FIX STRUCTURE -->
                    <td>
                        <a class="btn btn-sm btn-info"
                           th:href="@{/admin/order/{id}(id=${o.id})}">
                            Xem chi tiết
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ================= ORDER DETAILS ================= -->
    <!-- ================= UPDATE STATUS ================= -->
<div class="card mb-3" th:if="${selectedOrderId != null}">
    <div class="card-body">

        <form th:action="@{/admin/order/update-status}" method="post"
              class="d-flex align-items-center gap-3">

            <input type="hidden" name="orderId"
                   th:value="${selectedOrderId}">

            <label class="fw-bold mb-0">Trạng thái:</label>

            <select name="status" class="form-select w-auto">
                <option value="NEW">NEW</option>
                <option value="CONFIRMED">CONFIRMED</option>
                <option value="CANCELLED">CANCELLED</option>
            </select>

            <button class="btn btn-success">
                💾 Cập nhật
            </button>

        </form>

    </div>
</div>
    
    <div class="card" th:if="${orderDetails != null}">
        <div class="card-header fw-bold">
            🧾 Chi tiết đơn hàng #
            <span th:text="${selectedOrderId}"></span>
        </div>

        <div class="card-body p-0">
            <table class="table table-bordered mb-0">
                <thead class="table-secondary">
                <tr>
                    <th>ID</th>
                    <th>Sản phẩm</th>
                    <th>Giá</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="d : ${orderDetails}">
                    <td th:text="${d.id}"></td>
                    <td th:text="${d.product.name}"></td>
                    <td th:text="${#numbers.formatDecimal(d.price,0,'COMMA',0,'POINT')}"></td>
                    <td th:text="${d.quantity}"></td>
                    <td th:text="${#numbers.formatDecimal(d.price * d.quantity,0,'COMMA',0,'POINT')}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
